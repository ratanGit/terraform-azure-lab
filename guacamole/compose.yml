services:
  # 1. Database (PostgreSQL)
  guacamole-db:
    image: postgres:15-alpine
    container_name: guacamole-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GUAC_DB_NAME}
      POSTGRES_USER: ${GUAC_DB_USER}
      POSTGRES_PASSWORD: ${GUAC_DB_PASSWORD}
    volumes:
      - ${INIT_SQL_PATH}:/docker-entrypoint-initdb.d/initdb.sql:ro
      - ${DB_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - guac_network

  # 2. Guacamole Web Application
  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole-app
    restart: unless-stopped
    depends_on:
      - guacamole-db
      - guacd
    environment:
      GUACD_HOSTNAME: guacamole-guacd
      POSTGRESQL_HOSTNAME: guacamole-db
      POSTGRESQL_DATABASE: ${GUAC_DB_NAME}
      POSTGRESQL_USERNAME: ${GUAC_DB_USER}
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASSWORD}
      TOTP_ENABLED: "true"
    ports:
      - "${GUAC_PORT}:8080"
    volumes:
      - ${GUAC_HOME_DIR}:/home/guacamole
    networks:
      - guac_network

  # 3. Guacamole Proxy Daemon (guacd)
  guacd:
    image: guacamole/guacd:latest
    container_name: guacamole-guacd
    restart: unless-stopped
    networks:
      - guac_network

  # 4. Nginx Proxy Manager (NPM)
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      DB_MYSQL_USER: ${NPM_DB_USER}
      DB_MYSQL_PASSWORD: ${NPM_DB_PASSWORD}
      DB_MYSQL_NAME: ${NPM_DB_NAME}
    volumes:
      - ${NPM_DATA_PATH}:/data
      - ${LETSENCRYPT_PATH}:/etc/letsencrypt
    networks:
      - guac_network

networks:
  guac_network:
    driver: bridge